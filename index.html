<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>EV충전기 현장촬영</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --gray-bg: #f4f5f7;
    --border: #d9dce1;
    --green: #16a34a;
    --red: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--gray-bg);
    margin: 0;
    padding: 16px;
    color: #1f2430;
  }
  h1 { font-size: 20px; margin: 0 0 16px; }
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card h2 { font-size: 15px; margin: 0 0 10px; color: #55596b; }
  input[type=file], input[type=text] {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
  }
  button {
    font-size: 16px;
    padding: 12px 18px;
    border-radius: 8px;
    border: none;
    background: var(--blue);
    color: #fff;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
  }
  button:active { background: var(--blue-dark); }
  button:disabled { background: #a9b0bd; }
  button.secondary { background: #fff; color: var(--blue); border: 1px solid var(--blue); }
  .status { font-size: 13px; color: #666; margin-top: 8px; white-space: pre-line; }
  .status.ok { color: var(--green); }
  .status.err { color: var(--red); }
  ul.results {
    list-style: none; padding: 0; margin: 10px 0 0;
    max-height: 220px; overflow-y: auto; border-top: 1px solid var(--border);
  }
  ul.results li {
    padding: 10px 4px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; cursor: pointer;
  }
  ul.results li:active { background: #f0f4ff; }
  ul.results li .name { font-size: 15px; }
  ul.results li .waitno { font-size: 13px; color: #888; }
  .selected-box {
    background: #eef4ff; border: 1px solid #c3d7fb; border-radius: 10px;
    padding: 14px; margin-top: 10px;
  }
  .selected-box .title { font-weight: 600; font-size: 16px; }
  .selected-box .sub { font-size: 13px; color: #667; margin-top: 2px; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
  .photo-grid a {
    display: block; aspect-ratio: 1; background: #eee; border-radius: 8px; overflow: hidden;
    text-decoration: none; display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #999; border: 1px solid var(--border);
  }
  .hidden { display: none !important; }
  .badge {
    display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 999px;
    background: #e8ecf3; color: #555; margin-left: 6px;
  }
  .site-panel {
    border: 1px solid var(--border); border-radius: 10px; padding: 12px;
    margin-top: 14px; background: #fafbfc;
  }
  .site-panel h3 { font-size: 15px; margin: 0 0 8px; }
  .site-panel .status { margin-top: 6px; }
  .camera-overlay {
    position: fixed; inset: 0; background: #000; z-index: 1000;
    display: flex; flex-direction: column;
  }
  .camera-overlay.hidden { display: none !important; }
  .camera-overlay video { flex: 1; width: 100%; min-height: 0; object-fit: cover; background: #000; }
  .video-wrap { position: relative; flex: 1; min-height: 0; display: flex; }
  .video-wrap video { flex: 1; }
  .focus-ring {
    position: absolute; width: 76px; height: 76px; margin-left: -38px; margin-top: -38px;
    border: 2px solid #fff; border-radius: 8px; pointer-events: none;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4); transition: opacity 0.25s ease, transform 0.15s ease;
  }
  .focus-ring.hidden { display: none !important; }
  .focus-ring.pulse { animation: focusPulse 0.5s ease; }
  @keyframes focusPulse { 0% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  .close-btn.torch-on { background: #ffcc33; color: #111; border-color: #ffcc33; }

  /* 화면 방향 잠금(screen.orientation.lock)이 지원되지 않는 기기/브라우저에서
     휴대폰을 가로로 돌렸을 때를 대비한 안전장치. CSS로 화면 전체를 강제로
     회전시키는 방식은 터치 좌표(탭 초점, 핀치줌 등)가 어긋나는 부작용이 있어
     쓰지 않고, 대신 실제로 가로가 되더라도 버튼이 겹치거나 화면 밖으로
     밀려나지 않도록만 레이아웃을 보정한다.
     (기본적인 방향 고정은 openCamera()에서 전체화면 + screen.orientation.lock으로
     처리하며, 이게 지원되는 대부분의 최신 안드로이드 브라우저에서는 가로로
     돌려도 화면이 세로로 고정된 채 유지된다.) */
  @media screen and (orientation: landscape) {
    .camera-overlay .camera-bar {
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
    }
  }
  .camera-overlay .camera-bar {
    padding: 12px 16px; background: #111; display: flex;
    align-items: center; justify-content: space-between; gap: 10px;
  }
  .camera-overlay .count { color: #fff; font-size: 14px; }
  .camera-overlay .spacer { width: 60px; flex-shrink: 0; }
  .shutter-btn {
    width: 68px; height: 68px; border-radius: 50%; background: #fff;
    border: 4px solid #999; margin: 0; padding: 0; flex-shrink: 0;
    touch-action: none; -webkit-user-select: none; user-select: none;
  }
  .shutter-btn:active, .shutter-btn.holding { background: #ff5252; }
  .close-btn { background: transparent; color: #fff; border: 1px solid #666; width: auto; padding: 8px 12px; margin: 0; font-size: 13px; white-space: nowrap; }
  .close-btn.voice-off { color: #888; border-color: #444; }
  .camera-overlay .queue-status {
    color: #9be29b; font-size: 12px; text-align: center; padding: 6px 0; background: #111; min-height: 16px;
  }
  .review-tray {
    display: flex; gap: 6px; padding: 8px 10px; overflow-x: auto;
    background: #111; border-top: 1px solid #333;
  }
  .review-tray.hidden { display: none !important; }
  .review-tray .thumb {
    position: relative; flex-shrink: 0; width: 56px; height: 56px;
    border-radius: 8px; overflow: hidden; border: 2px solid #444;
  }
  .review-tray .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .review-tray .thumb .del {
    position: absolute; top: 0; right: 0; width: 20px; height: 20px;
    background: rgba(220,38,38,0.9); color: #fff; border: none; border-radius: 0 0 0 8px;
    font-size: 13px; line-height: 20px; padding: 0; margin: 0; cursor: pointer;
  }
  .config-warning {
    background: #fff3cd; border: 1px solid #ffe08a; color: #7a5b00;
    border-radius: 10px; padding: 12px; margin-bottom: 16px; font-size: 13px;
  }
  .site-panel .btn-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .site-panel .btn-row button { flex: 1 1 0; width: auto; margin-top: 0; min-width: 0; font-size: 13px; padding: 10px 4px; }
  .site-panel .btn-row button.upload-btn { background: #fff; color: var(--blue); border: 1px solid var(--blue); }
  .site-panel .btn-row button.native-cam-btn { background: #fff; color: #333; border: 1px solid #999; }
  .memo-card textarea {
    width: 100%; min-height: 100px; padding: 12px; font-size: 15px;
    border: 1px solid var(--border); border-radius: 8px; font-family: inherit; resize: vertical;
  }
  .photo-viewer {
    position: fixed; inset: 0; background: #000; z-index: 2000;
    display: flex; flex-direction: column;
  }
  .photo-viewer.hidden { display: none !important; }
  .photo-viewer .viewer-bar {
    padding: 12px 16px; background: #111; display: flex;
    align-items: center; justify-content: space-between; gap: 10px; color: #fff; font-size: 13px;
  }
  .photo-viewer .viewer-stage {
    flex: 1; min-height: 0; overflow: hidden; touch-action: none;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .photo-viewer .viewer-stage img {
    max-width: 100%; max-height: 100%; touch-action: none;
    transform-origin: center center; will-change: transform; user-select: none; -webkit-user-drag: none;
  }
</style>
</head>
<body>

<h1>EV충전기 현장촬영</h1>

<div class="card config-warning hidden" id="configWarning">
  ⚠️ API_URL이 아직 설정되지 않았습니다. capture.html 맨 아래 스크립트에서
  <code>const API_URL = '...'</code> 부분을 실제 구글 앱스 스크립트 배포 URL로 바꿔주세요.
</div>

<div class="card hidden" id="loadingCard">
  <div class="status" id="loadingStatus">불러오는 중...</div>
</div>

<div class="card hidden" id="uploadCard">
  <h2>1. 신청관리.xlsx 업로드</h2>
  <input type="file" id="xlsxInput" accept=".xlsx">
  <div class="status" id="uploadStatus"></div>
</div>

<div class="card hidden" id="searchCard">
  <h2>2. 대기번호 검색 <span class="badge" id="rosterCountBadge"></span></h2>
  <input type="text" id="searchInput" inputmode="numeric" placeholder="대기번호를 입력하세요 (예: 2532)">
  <ul class="results" id="searchResults"></ul>
  <button class="secondary" id="reuploadBtn" style="margin-top:14px;">엑셀 다시 업로드(명단 갱신)</button>
</div>

<div class="card hidden" id="selectedCard">
  <h2>3. 선택된 현장</h2>
  <div class="selected-box">
    <div class="title" id="selTitle"></div>
    <div class="sub" id="selSub"></div>
  </div>

  <div id="siteCountBox">
    <h2 style="margin-top:16px;">거점수 입력</h2>
    <input type="text" id="siteCountInput" inputmode="numeric" placeholder="예: 3">
    <button id="siteCountConfirmBtn">확인</button>
    <div class="status" id="siteCountStatus"></div>
  </div>

  <div id="sitePanels" class="hidden"></div>
  <button id="changeSiteCountBtn" class="secondary hidden">거점수 변경</button>

  <div class="memo-card">
    <h2 style="margin-top:16px;">관련 서류(보조사업 신청서 PDF, 화면 캡처 등)</h2>
    <button type="button" class="secondary" id="docUploadBtn">📄 서류 업로드</button>
    <input type="file" id="docUploadInput" accept=".pdf,image/*" multiple class="hidden">
    <div class="status" id="docStatus"></div>
    <div class="photo-grid" id="docList"></div>
  </div>

  <div class="memo-card">
    <h2 style="margin-top:16px;">특이사항 메모</h2>
    <textarea id="memoInput" placeholder="현장에서 특이사항이 있으면 기록해주세요"></textarea>
    <button type="button" class="secondary" id="memoSaveBtn">메모 저장</button>
    <div class="status" id="memoStatus"></div>
  </div>

  <!-- 실시간 카메라를 지원하지 않는 아주 오래된 브라우저에서만 쓰이는 예비용 입력 -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
  <!-- 휴대폰에 이미 있는 사진을 골라서 바로 업로드할 때 쓰는 입력 -->
  <input type="file" id="galleryUploadInput" accept="image/*" multiple class="hidden">
</div>

<div class="camera-overlay hidden" id="cameraOverlay">
  <div class="camera-bar">
    <button type="button" class="close-btn" id="cameraCloseBtn">✕ 닫기</button>
    <span class="count" id="cameraShotCount">0장 촬영됨</span>
    <button type="button" class="close-btn" id="voiceToggleBtn">🎤 음성 켜짐</button>
  </div>
  <div class="video-wrap" id="videoWrap">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <div class="focus-ring hidden" id="focusRing"></div>
  </div>
  <div class="review-tray hidden" id="reviewTray"></div>
  <div class="camera-bar">
    <button type="button" class="close-btn hidden" id="torchToggleBtn">🔦 조명 켜기</button>
    <button type="button" class="shutter-btn" id="shutterBtn"></button>
    <span class="spacer"></span>
  </div>
  <div class="queue-status" id="cameraQueueStatus"></div>
</div>

<div class="photo-viewer hidden" id="photoViewer">
  <div class="viewer-bar">
    <button type="button" class="close-btn" id="viewerCloseBtn">✕ 닫기</button>
    <span id="viewerIndexLabel"></span>
    <button type="button" class="close-btn" id="viewerDeleteBtn">🗑 삭제</button>
  </div>
  <div class="viewer-stage" id="viewerStage">
    <img id="viewerImg" draggable="false">
  </div>
</div>

<canvas id="captureCanvas" class="hidden"></canvas>

<script>
// ====================================================================
// ⚠️ 배포 후 반드시 채워야 하는 값입니다.
// script.google.com에서 Code.gs를 웹 앱으로 배포하면 나오는
// https://script.google.com/macros/s/xxxxxxxx/exec 형태의 URL을 그대로 넣으세요.
// ====================================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbyn5qdy6f2KrwWJUTjtx2BA0LM-XgcHDAgmZOm9-AWuTJpkiwUgqoU2IX0--_XssMK-/exec';

// 사진 업로드/조회 전용 -- Cloudflare R2를 통해 직접 저장합니다(구글 앱스 스크립트보다 훨씬 빠름).
const WORKER_URL = 'https://round-hill-4d45.bty3952.workers.dev';

// 명단(대기번호 검색용 roster) 조회/저장 -- 최상위 고정 키 'roster.json'에 JSON 배열로 저장한다.
// (사진: <대기번호>/<거점번호>/..., 서류: <대기번호>/docs/... 와 같은 R2 버킷, 다른 자리.)
function getRosterFromR2_() {
  return fetch(WORKER_URL + '/upload/roster.json', { cache: 'no-store' })
    .then(function (resp) {
      if (resp.status === 404) return [];
      if (!resp.ok) throw new Error('명단 조회 실패 (status ' + resp.status + ')');
      return resp.json();
    });
}

function saveRosterToR2_(rows) {
  return fetch(WORKER_URL + '/upload/roster.json', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(rows),
  }).then(function (resp) {
    if (!resp.ok) throw new Error('명단 저장 실패 (status ' + resp.status + ')');
    return rows;
  });
}

// R2는 구글 앱스 스크립트처럼 서버 쪽에서 기존 명단과 자동으로 합쳐주지 않는 단순
// 저장소이므로, 새로 업로드할 때 기존 명단 + 새 행을 여기서 직접 합친다(중복 제거).
function mergeRosterRows_(existing, incoming) {
  const merged = (existing || []).slice();
  const seen = new Set(merged.map(function (r) { return r.waitingNo + '||' + r.applicantName; }));
  (incoming || []).forEach(function (r) {
    const key = r.waitingNo + '||' + r.applicantName;
    if (!seen.has(key)) { seen.add(key); merged.push(r); }
  });
  return merged;
}

// 신청관리 엑셀의 나머지 컬럼(충전요금/설치방식/주차면수 등, 보고서 작성에 필요)까지 담은
// 마스터 데이터 -- roster.json과 달리 대기번호||신청자명을 키로 하는 객체이며, 새로 업로드할
// 때마다 겹치는 대기번호는 최신 값으로 갱신되고 새 대기번호는 추가되는 식으로 계속 누적된다.
// (예전에는 원본 엑셀 파일 자체를 매번 새 파일로 저장했으나, 파일이 계속 쌓이기만 하고
// 검색하기 번거로워 2026-07에 이 방식으로 바꿨다.)
function getRosterDataFromR2_() {
  return fetch(WORKER_URL + '/upload/roster-data.json', { cache: 'no-store' })
    .then(function (resp) {
      if (resp.status === 404) return {};
      if (!resp.ok) throw new Error('원본 데이터 조회 실패 (status ' + resp.status + ')');
      return resp.json();
    });
}

function saveRosterDataToR2_(data) {
  return fetch(WORKER_URL + '/upload/roster-data.json', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  }).then(function (resp) {
    if (!resp.ok) throw new Error('원본 데이터 저장 실패 (status ' + resp.status + ')');
    return data;
  });
}

if (!API_URL || API_URL.indexOf('PUT_YOUR_') === 0) {
  document.getElementById('configWarning').classList.remove('hidden');
}

// ====================================================================
// 구글 앱스 스크립트 API를 부르는 공용 함수 — fetch()를 쓰지 않는다.
//
// 구글 앱스 스크립트의 /exec 주소는 응답 전에 302 리다이렉트를 한 번 거치는데,
// 그 리다이렉트 응답 자체에 CORS 허용 헤더가 없어서, 다른 도메인(깃허브 페이지 등)에서
// fetch()로 부르면 "액세스 권한"을 무엇으로 두든 브라우저가 "Failed to fetch"로
// 막아버립니다(구글 앱스 스크립트 자체의 구조적 한계 — 실제 콘솔 오류로 확인됨).
// 그래서 fetch/CORS를 아예 거치지 않는 두 가지 방식을 씁니다.
// ====================================================================

let jsonpCounter = 0;

// 조회(읽기)용: <script src="...?action=...&callback=..."> 로 JSONP 호출.
// <script> 태그로 불러오는 리소스는 CORS 검사를 받지 않으므로 항상 동작한다.
function callApiRead(action, params) {
  return new Promise(function (resolve, reject) {
    const cbName = 'jsonp_cb_' + (jsonpCounter++) + '_' + Math.floor(Math.random() * 1000000);
    const timeoutId = setTimeout(function () {
      cleanup();
      reject(new Error('요청 시간이 초과되었습니다. 네트워크 상태를 확인해주세요.'));
    }, 20000);

    function cleanup() {
      clearTimeout(timeoutId);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function (data) {
      cleanup();
      if (!data || !data.ok) { reject(new Error((data && data.error) || '알 수 없는 오류')); return; }
      resolve(data.result);
    };

    const qs = new URLSearchParams(Object.assign({ action: action, callback: cbName }, flattenParams_(params || {})));
    const script = document.createElement('script');
    script.src = API_URL + '?' + qs.toString();
    script.onerror = function () {
      cleanup();
      reject(new Error('요청을 보내지 못했습니다. API_URL과 네트워크 상태를 확인해주세요.'));
    };
    document.body.appendChild(script);
  });
}

// 저장(쓰기)용: 화면에 보이지 않는 <form method="POST" target="숨겨진 iframe">으로 제출.
// 폼 제출은 CORS 검사 대상이 아니라서 항상 서버까지 도달한다. 다만 응답 내용을
// 자바스크립트로 읽을 수는 없으므로(교차 출처 iframe), 여기서는 "제출이 끝났다"까지만
// 확인하고, 실제로 반영됐는지는 호출한 쪽에서 조회(callApiRead)로 다시 확인한다.
let writeFrameCounter = 0;
function callApiWrite(action, params) {
  return new Promise(function (resolve) {
    const frameName = 'write_frame_' + (writeFrameCounter++) + '_' + Math.floor(Math.random() * 1000000);
    const iframe = document.createElement('iframe');
    iframe.name = frameName;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = API_URL;
    form.target = frameName;
    form.style.display = 'none';

    function addField(name, value) {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = name;
      input.value = value;
      form.appendChild(input);
    }
    addField('action', action);
    addField('payload', JSON.stringify(params || {}));
    document.body.appendChild(form);

    let done = false;
    function finish() {
      if (done) return;
      done = true;
      clearTimeout(timeoutId);
      setTimeout(function () {
        if (form.parentNode) form.parentNode.removeChild(form);
        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
      }, 1000);
      resolve();
    }

    const timeoutId = setTimeout(finish, 15000); // 응답을 못 읽으니 최대 대기 후에는 그냥 진행
    iframe.addEventListener('load', finish);

    form.submit();
  });
}

// { a: [1,2], b: {x:1} } 같은 값을 URLSearchParams에 넣을 수 있도록
// 객체/배열은 JSON 문자열로, 나머지는 그냥 문자열로 바꾼다.
function flattenParams_(params) {
  const out = {};
  Object.keys(params).forEach(function (k) {
    const v = params[k];
    out[k] = (v !== null && typeof v === 'object') ? JSON.stringify(v) : String(v);
  });
  return out;
}

// 큰 파일도 안전하게(호출 스택 초과 없이) base64로 바꾸기 위해 잘게 나눠서 처리한다.
function uint8ToBase64_(bytes) {
  let binary = '';
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    const chunk = bytes.subarray(i, i + chunkSize);
    binary += String.fromCharCode.apply(null, chunk);
  }
  return btoa(binary);
}

xlsxInput.addEventListener('change', function (e) {
  const file = e.target.files[0];
  if (!file) return;
  uploadStatus.textContent = '엑셀 읽는 중...';
  uploadStatus.className = 'status';
  const reader = new FileReader();
  reader.onload = function (evt) {
    try {
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const grid = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });

      // 헤더 행을 자동으로 찾는다 ("대기 번호"라는 셀이 있는 행)
      let headerRowIdx = -1, waitCol = -1, nameCol = -1;
      for (let r = 0; r < Math.min(grid.length, 10); r++) {
        const row = grid[r] || [];
        const wi = row.findIndex(c => typeof c === 'string' && c.replace(/\s/g, '') === '대기번호');
        if (wi !== -1) {
          headerRowIdx = r;
          waitCol = wi;
          nameCol = row.findIndex(c => typeof c === 'string' && c.replace(/\s/g, '') === '신청자명');
          break;
        }
      }
      if (headerRowIdx === -1 || nameCol === -1) {
        throw new Error('"대기 번호" 또는 "신청자명" 열을 찾지 못했습니다. 파일 형식을 확인해주세요.');
      }
      const headerRow = grid[headerRowIdx] || [];

      const seen = new Set();
      rows = [];
      const fullRowsByKey = {}; // 대기번호||신청자명 -> 전체 컬럼(충전요금/설치방식 등)
      for (let r = headerRowIdx + 1; r < grid.length; r++) {
        const row = grid[r] || [];
        const waitRaw = row[waitCol];
        const nameRaw = row[nameCol];
        if (waitRaw === null || waitRaw === undefined || waitRaw === '') continue;
        if (!nameRaw) continue;
        let waitingNo = waitRaw;
        if (typeof waitingNo === 'number') waitingNo = String(Math.trunc(waitingNo));
        else waitingNo = String(waitingNo).trim();
        const applicantName = String(nameRaw).trim();
        const key = waitingNo + '||' + applicantName;
        if (seen.has(key)) continue;
        seen.add(key);
        rows.push({ waitingNo, applicantName });

        const fullRow = {};
        headerRow.forEach(function (h, idx) {
          if (h === null || h === undefined || h === '') return;
          fullRow[String(h).trim()] = row[idx] === undefined ? null : row[idx];
        });
        fullRowsByKey[key] = fullRow;
      }

      if (rows.length === 0) {
        throw new Error('읽어온 대상이 없습니다.');
      }

      uploadStatus.textContent = rows.length + '건 확인됨. R2에 명단 저장 중...';
      // R2는 서버 쪽에서 자동으로 기존 명단과 합쳐주지 않으므로, 여기서 기존 명단을
      // 먼저 읽어와 이번에 올린 행들과 합친(중복 제거) 뒤 통째로 다시 저장한다.
      getRosterFromR2_()
        .then(function (existingRows) { return mergeRosterRows_(existingRows, rows); })
        .then(function (merged) { return saveRosterToR2_(merged); })
        .then(onFoldersCreated)
        .catch(onServerError);

      // 대기번호/신청자명만 뽑은 것과 별개로, 충전요금·설치방식 등 다른 열까지 담긴 전체 행
      // 데이터도 roster-data.json에 병합 저장해둔다(나중에 보고서 만들 때 다시 첨부하지
      // 않아도 되도록). 겹치는 대기번호는 이번 값으로 갱신되고, 새 대기번호는 추가된다 --
      // 원본 엑셀 파일을 매번 새로 저장하지 않으므로 파일이 쌓이지 않는다. 핵심 흐름(명단
      // 저장)을 막지 않도록 별도로 진행한다.
      try {
        getRosterDataFromR2_()
          .then(function (existingData) {
            const merged = Object.assign({}, existingData, fullRowsByKey);
            return saveRosterDataToR2_(merged);
          })
          .catch(function () { /* 실패해도 명단 저장 자체에는 영향 없음 */ });
      } catch (e) { /* 실패해도 명단 저장 자체에는 영향 없음 */ }
    } catch (err) {
      uploadStatus.textContent = '오류: ' + err.message;
      uploadStatus.className = 'status err';
    }
  };
  reader.readAsArrayBuffer(file);
});

// 서버(Code.gs)는 새로 올린 명단을 기존 명단과 합쳐서(덮어쓰지 않고) 저장한다. 그래서
// 여기서도 "방금 올린 파일의 행 개수"가 아니라, 서버가 돌려준 병합된 전체 목록(savedRows)을
// 그대로 검색용 rows로 채택해야 한다 — 이전 버전은 이걸 안 해서, 기존에 이미 구글 드라이브에
// 폴더가 있던 현장들이 화면 검색에서 사라져 보이는 문제가 있었다.
function onFoldersCreated(savedRows) {
  const uploadedRows = rows; // 이번에 엑셀에서 새로 파싱된 행들(저장 확인용, 개수 비교용)
  const merged = savedRows || [];
  const mergedKeys = new Set(merged.map(function (r) { return r.waitingNo + '||' + r.applicantName; }));
  const missing = uploadedRows.filter(function (r) { return !mergedKeys.has(r.waitingNo + '||' + r.applicantName); });

  rows = merged; // 이후 검색은 서버에 저장된 전체(기존 + 이번에 올린 것 병합) 명단 기준으로 한다

  if (missing.length === 0) {
    uploadStatus.textContent = '명단 저장 완료. 전체 ' + rows.length + '건(이번에 올린 '
      + uploadedRows.length + '건 포함) 검색 가능합니다. 다음부터는 다시 업로드하지 않아도 됩니다.';
    uploadStatus.className = 'status ok';
  } else {
    uploadStatus.textContent = missing.length + '건이 저장 확인이 안 됐습니다 — 다시 시도해주세요. (전체 ' + rows.length + '건)';
    uploadStatus.className = 'status err';
  }
  uploadCard.classList.add('hidden');
  searchCard.classList.remove('hidden');
  rosterCountBadge.textContent = rows.length + '건';
  searchInput.value = '';
  searchInput.focus();
  renderResults('');
}

function onServerError(err) {
  uploadStatus.textContent = '구글 드라이브 처리 중 오류: ' + err.message;
  uploadStatus.className = 'status err';
}

function renderResults(query) {
  filtered = !query
    ? rows
    : rows.filter(r => r.waitingNo.includes(query) || r.applicantName.includes(query));
  searchResults.innerHTML = '';
  filtered.slice(0, 30).forEach(function (r) {
    const li = document.createElement('li');
    li.innerHTML = '<span class="name">' + r.applicantName + '</span>'
      + '<span class="waitno">대기번호 ' + r.waitingNo + '</span>';
    li.addEventListener('click', function () { selectRow(r); });
    searchResults.appendChild(li);
  });
  if (filtered.length === 0) {
    searchResults.innerHTML = '<li style="color:#999;">일치하는 결과가 없습니다.</li>';
  }
}

      changeSiteCountBtn.classList.remove('hidden');

    .catch(function (err) {

// 저장(callApiWrite)은 응답 내용을 읽을 수 없으므로(교차 출처 iframe), 다른 저장
// 동작들과 마찬가지로 저장 후 다시 조회(callApiRead)해서 실제로 반영됐는지 확인한다.
// 이전 버전은 이 확인 없이 그냥 "저장되었습니다"라고 표시해서, 실제로는 네트워크
// 문제로 저장이 안 됐는데도 성공한 것처럼 보이는 문제가 있었다.
function saveMemoWithConfirm_(r, text, attemptsLeft) {
  return callApiWrite('saveMemo', { waitingNo: r.waitingNo, applicantName: r.applicantName, memoText: text })
    .then(function () { return callApiRead('getMemo', { waitingNo: r.waitingNo, applicantName: r.applicantName }); })
    .then(function (savedText) {
      if (savedText === text) return true;
      if (attemptsLeft > 1) return saveMemoWithConfirm_(r, text, attemptsLeft - 1);
      throw new Error('저장을 시도했지만 반영이 확인되지 않았습니다');
    });
}

function loadMemo_(r, attemptsLeft) {
  callApiRead('getMemo', { waitingNo: r.waitingNo, applicantName: r.applicantName })
    .then(function (text) {
      if (!selected || selected.waitingNo !== r.waitingNo || selected.applicantName !== r.applicantName) return;
      memoInput.value = text || '';
      memoStatus.textContent = '';
      memoStatus.className = 'status';
    })
    .catch(function (err) {
      if (!selected || selected.waitingNo !== r.waitingNo || selected.applicantName !== r.applicantName) return;
      if (attemptsLeft > 1) { loadMemo_(r, attemptsLeft - 1); return; }
      // 조용히 무시하지 않고, 못 불러왔다는 사실을 화면에 남겨서 "빈 메모"와 착각하지 않게 한다.
      memoStatus.textContent = '메모를 불러오지 못했습니다(' + err.message + '). 저장하기 전에 새로고침 후 다시 확인해주세요.';
      memoStatus.className = 'status err';
    });
}

// 관련 서류 업로드 — 보조사업 신청서 PDF, 화면 캡처(CID표) 등을 촬영 사진과는
// 별개로 "대기번호-신청자명" 폴더 바로 아래(거점 하위 폴더 말고)에 저장한다.
// 사용자가 구글 드라이브에 직접 파일을 넣어도 같은 폴더이므로 여기 목록에 함께 보인다.
// 촬영 사진 업로드와 마찬가지로 서버 쪽이 같은 파일명이면 중복 저장하지 않는다.
// ------------------------------------------------------------------
function renderDocList_(docs) {
  docList.innerHTML = '';
  (docs || []).forEach(function (d) {
    const a = document.createElement('a');
    a.href = d.url;
    a.target = '_blank';
    a.textContent = d.name;
    docList.appendChild(a);
  });
}

// R2 업로드 키: <대기번호>/docs/<파일명> -- 사진(<대기번호>/<거점번호>/<파일명>)과 구분되는 자리.
function docKey_(waitingNo, fileName) {
  return waitingNo + '/docs/' + fileName;
}

function listDocsFromR2_(waitingNo) {
  const prefix = waitingNo + '/docs/';
  const prefixPath = prefix.split('/').map(encodeURIComponent).join('/');
  return fetch(WORKER_URL + '/list/' + prefixPath, { cache: 'no-store' })
    .then(function (resp) { return resp.json(); })
    .then(function (data) { return (data && data.items) || []; });
}

function refreshDocumentList_(r) {
  listDocsFromR2_(r.waitingNo)
    .then(function (docs) {
      if (!selected || selected.waitingNo !== r.waitingNo || selected.applicantName !== r.applicantName) return;
      renderDocList_(docs);
    })
    .catch(function () { /* 조용히 무시 */ });
}

docUploadInput.addEventListener('change', function (e) {
  const files = Array.from(e.target.files || []);
  docUploadInput.value = '';
  if (!files.length || !selected) return;
  const r = selected;
  let remaining = files.length;
  let failCount = 0;
  docStatus.textContent = '업로드 중... (0/' + files.length + ')';
  docStatus.className = 'status';

  files.forEach(function (file) {
    const key = docKey_(r.waitingNo, file.name);
    const keyPath = key.split('/').map(encodeURIComponent).join('/');
    fetch(WORKER_URL + '/upload/' + keyPath, {
      method: 'PUT',
      headers: { 'Content-Type': file.type || 'application/octet-stream' },
      body: file,
    })
      .then(function (resp) {
        if (!resp.ok) throw new Error('업로드 실패 (status ' + resp.status + ')');
        return listDocsFromR2_(r.waitingNo);
      })
      .then(function (docs) {
        if (selected && selected.waitingNo === r.waitingNo && selected.applicantName === r.applicantName) renderDocList_(docs);
      })
      .catch(function () { failCount++; })
      .then(function () { finishOneDocUpload_(); });
  });

  function finishOneDocUpload_() {
    remaining--;
    if (remaining > 0) {
      docStatus.textContent = '업로드 중... (' + (files.length - remaining) + '/' + files.length + ')';
      return;
    }
    if (failCount === 0) {
      docStatus.textContent = '업로드 완료(' + files.length + '건).';
      docStatus.className = 'status ok';
    } else {
      docStatus.textContent = failCount + '건 업로드 실패 — 다시 시도해주세요.';
      docStatus.className = 'status err';
    }
  }
});

function renderSitePanels(n) {
  sitePanels.innerHTML = '';
  for (let i = 1; i <= n; i++) {
    const panel = document.createElement('div');
    panel.className = 'site-panel';
    panel.innerHTML =
      '<h3>' + i + '거점</h3>' +
      '<div class="btn-row">' +
      '<button class="shoot-btn" data-site="' + i + '">📷 ' + i + '거점 촬영</button>' +
      '<button type="button" class="native-cam-btn" data-site="' + i + '">📸 기본카메라</button>' +
      '<button type="button" class="upload-btn" data-site="' + i + '">⬆ 사진 업로드</button>' +
      '</div>' +
      '<div class="status" id="shootStatus-' + i + '"></div>' +
      '<div class="photo-grid" id="photoGrid-' + i + '"></div>';
    sitePanels.appendChild(panel);
    refreshPhotoList(i);
  }
  sitePanels.querySelectorAll('.shoot-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      openCamera(parseInt(btn.getAttribute('data-site'), 10));
    });
  });
  sitePanels.querySelectorAll('.native-cam-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      // 스마트폰 기본 카메라 앱을 직접 열어서 한 장 찍고 바로 돌아오는 방식.
      // 웹 표준상 기본 카메라 앱은 "한 장 찍고 즉시 페이지로 복귀"만 가능해서
      // 앱 내 연속 촬영처럼 여러 장을 이어 찍을 수는 없다 — 명판/측정기처럼
      // 한 장만 특히 선명하게 찍고 싶을 때 쓰는 용도.
      activeSiteIdx = parseInt(btn.getAttribute('data-site'), 10);
      cameraInput.click();
    });
  });
  sitePanels.querySelectorAll('.upload-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      galleryUploadInput.dataset.site = btn.getAttribute('data-site');
      galleryUploadInput.click();
    });
  });
}

// 휴대폰 갤러리에서 사진을 직접 골라 업로드(카메라 촬영을 거치지 않음).
// 이미 폰에 있는 파일이므로 별도로 다시 다운로드 저장은 하지 않고 바로 업로드 대기열에 넣는다.
galleryUploadInput.addEventListener('change', function (e) {
  const files = Array.from(e.target.files || []);
  const siteIdx = parseInt(galleryUploadInput.dataset.site, 10);
  galleryUploadInput.value = '';
  if (!files.length || !selected || !siteIdx) return;
  files.forEach(function (file) {
    enqueueUpload(siteIdx, file, file.type || 'image/jpeg');
  });
  setSiteStatus(siteIdx, files.length + '장 업로드 대기열에 추가됨');
});

// ------------------------------------------------------------------
// 실시간 카메라 촬영
//
// 이 페이지는 (구글 앱스 스크립트의 sandbox iframe이 아니라) 일반 정적 웹페이지로
// 직접 호스팅되므로, getUserMedia로 화면 안에 진짜 실시간 카메라를 띄울 수 있다.
// "N거점 촬영" 버튼을 누르면 카메라 화면이 뜨고, 하단 ● 버튼을 누를 때마다
// 확인 절차 없이 그 자리에서 즉시 한 장씩 캡처된다. 카메라 화면은 "✕ 닫기"를
// 누르기 전까지 계속 켜져 있으므로, 휴대폰 기본 카메라 앱처럼 계속 이어서
// 촬영할 수 있다. 캡처된 사진은 업로드 완료를 기다리지 않고 바로 백그라운드
// 업로드 대기열에 쌓인다.
// (아주 오래된 브라우저 등 getUserMedia를 지원하지 않는 경우에만 예전 방식
// (휴대폰 기본 카메라 앱 호출)으로 자동 전환된다.)
// ------------------------------------------------------------------

const cameraOverlay = document.getElementById('cameraOverlay');
const cameraVideo = document.getElementById('cameraVideo');
const cameraCloseBtn = document.getElementById('cameraCloseBtn');
const shutterBtn = document.getElementById('shutterBtn');
const cameraShotCount = document.getElementById('cameraShotCount');
const cameraQueueStatus = document.getElementById('cameraQueueStatus');
const captureCanvas = document.getElementById('captureCanvas');
const videoWrap = document.getElementById('videoWrap');
const focusRing = document.getElementById('focusRing');
const torchToggleBtn = document.getElementById('torchToggleBtn');

let currentStream = null;
let currentTrack = null;   // 현재 카메라 스트림의 video track (초점/노출/손전등 제어용)
let imageCapture = null;   // 지원 기기에서 하드웨어 정지사진 캡처에 사용
let shotCountThisSession = 0;

// ------------------------------------------------------------------
// 화면 꺼짐 방지(Wake Lock) — 카메라를 쓰는 동안이나 업로드가 아직 남아있는 동안
// 화면이 자동으로 꺼지지 않게 한다. 화면이 꺼지면 브라우저가 백그라운드 작업(업로드
// 포함)을 크게 줄이거나 멈춰서, 그동안 촬영/업로드가 중단되는 문제가 있었다.
// (일부 구형 브라우저는 Wake Lock API를 지원하지 않을 수 있는데, 그런 경우 그냥
// 조용히 무시되고 기존처럼 동작한다 — 화면 꺼짐 방지만 안 될 뿐이다.)
// ------------------------------------------------------------------
let wakeLock = null;

function requestWakeLock_() {
  if (!('wakeLock' in navigator)) return;
  navigator.wakeLock.request('screen')
    .then(function (lock) { wakeLock = lock; })
    .catch(function () { /* 지원 안 하거나 권한 문제 — 무시 */ });
}

function releaseWakeLock_() {
  if (wakeLock) {
    wakeLock.release().catch(function () {});
    wakeLock = null;
  }
}

// 카메라가 열려 있거나, 아직 못 끝낸 업로드가 있으면 화면을 계속 켜둔다.
function updateWakeLock() {
  const cameraOpen = cameraOverlay && !cameraOverlay.classList.contains('hidden');
  const needed = cameraOpen || uploadQueue.length > 0;
  if (needed) requestWakeLock_(); else releaseWakeLock_();
}

// 화면이 잠겼다 다시 켜졌을 때(예: 사용자가 다시 화면을 켠 경우) Wake Lock이
// 자동으로 풀려있으므로, 필요하면 다시 걸어준다.
document.addEventListener('visibilitychange', function () {
  if (document.visibilityState === 'visible') updateWakeLock();
});

// ------------------------------------------------------------------
// 음성으로 촬영 — "찰칵"이라고 말하면 셔터를 누른 것처럼 사진이 찍힌다.
// 브라우저 내장 음성 인식(Web Speech API)을 쓴다. 크롬 계열(안드로이드 크롬 포함)에서만
// 지원되며, 지원하지 않는 브라우저에서는 버튼이 "미지원"으로 비활성화되고 셔터 버튼으로만
// 촬영하면 된다 — 이 기능이 없어도 기존 촬영 방식에는 전혀 영향이 없다.
// ------------------------------------------------------------------
const SpeechRecognitionCtor_ = window.SpeechRecognition || window.webkitSpeechRecognition;
const voiceToggleBtn = document.getElementById('voiceToggleBtn');
let voiceRecognition_ = null;
let voiceEnabled = true;   // 사용자가 켜둔 상태인지(꺼두면 카메라를 열어도 다시 켜지 않는다)
let voiceShouldRun_ = false; // 지금 이 순간 인식이 돌고 있어야 하는지(카메라가 열려있는 동안만)

function updateVoiceToggleLabel_() {
  if (!voiceToggleBtn) return;
  if (!SpeechRecognitionCtor_) {
    voiceToggleBtn.textContent = '🎤 미지원';
    voiceToggleBtn.disabled = true;
    voiceToggleBtn.classList.add('voice-off');
    return;
  }
  voiceToggleBtn.textContent = voiceEnabled ? '🎤 "찰칵" 켜짐' : '🎤 음성 꺼짐';
  voiceToggleBtn.classList.toggle('voice-off', !voiceEnabled);
}

function startVoiceRecognition_() {
  if (!SpeechRecognitionCtor_ || !voiceEnabled) return;
  voiceShouldRun_ = true;
  if (voiceRecognition_) { try { voiceRecognition_.stop(); } catch (e) {} }
  voiceRecognition_ = new SpeechRecognitionCtor_();
  voiceRecognition_.lang = 'ko-KR';
  voiceRecognition_.continuous = true;
  voiceRecognition_.interimResults = false;
  voiceRecognition_.onresult = function (event) {
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = (event.results[i][0] && event.results[i][0].transcript) || '';
      // "찰칵"의 흔한 인식 오류(짤칵/철칵 등)도 함께 받아준다.
      if (/찰\s*칵|짤\s*칵|철\s*칵/.test(transcript)) {
        captureFrameToTray();
      }
    }
  };
  voiceRecognition_.onerror = function () { /* 인식 실패는 무시 — onend에서 재시작 시도 */ };
  voiceRecognition_.onend = function () {
    // 음성 인식은 일정 시간(무음 등)이 지나면 자동으로 멈추는 경우가 많으므로,
    // 카메라가 아직 열려 있고 사용자가 꺼두지 않았다면 계속 다시 시작한다.
    if (voiceShouldRun_ && voiceEnabled && cameraOverlay && !cameraOverlay.classList.contains('hidden')) {
      try { voiceRecognition_.start(); } catch (e) {}
    }
  };
  try { voiceRecognition_.start(); } catch (e) {}
}

function stopVoiceRecognition_() {
  voiceShouldRun_ = false;
  if (voiceRecognition_) {
    try { voiceRecognition_.stop(); } catch (e) {}
    voiceRecognition_ = null;
  }
}

if (voiceToggleBtn) {
  voiceToggleBtn.addEventListener('click', function () {
    if (!SpeechRecognitionCtor_) return;
    voiceEnabled = !voiceEnabled;
    updateVoiceToggleLabel_();
    if (voiceEnabled) startVoiceRecognition_(); else stopVoiceRecognition_();
  });
}
updateVoiceToggleLabel_();

// 안드로이드 브라우저 대부분은 "전체화면 상태가 아니면" screen.orientation.lock()이
// 거부된다(SecurityError/NotSupportedError). 그래서 카메라를 열 때 촬영 화면을
// 먼저 전체화면으로 만든 다음 세로로 잠그는 순서로 시도한다 — 이렇게 해야 실제로
// 휴대폰을 가로로 돌려도 화면과 버튼이 세로로 고정된 채 유지된다. 전체화면/잠금
// 자체를 지원하지 않는 브라우저(예: 일부 iOS Safari)에서는 조용히 실패하고, 그 경우
// 위 CSS의 안전장치(레이아웃이 깨지지 않게만 보정)로 대체된다.
let didRequestFullscreenForCamera_ = false;

function lockPortraitForCamera_() {
  didRequestFullscreenForCamera_ = false;
  try {
    const el = cameraOverlay;
    const reqFs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if (reqFs) {
      Promise.resolve(reqFs.call(el)).then(function () {
        didRequestFullscreenForCamera_ = true;
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('portrait').catch(function () {});
        }
      }).catch(function () {
        // 전체화면 자체가 막힌 경우, 그래도 밑져야 본전으로 잠금만 시도해본다.
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('portrait').catch(function () {});
        }
      });
    } else if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait').catch(function () {});
    }
  } catch (e) { /* 지원하지 않는 브라우저는 그냥 가로 회전이 허용됨 */ }
}

function unlockPortraitForCamera_() {
  try {
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
  } catch (e) {}
  try {
    if (didRequestFullscreenForCamera_ && document.fullscreenElement) {
      const exitFs = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
      if (exitFs) exitFs.call(document);
    }
  } catch (e) {}
  didRequestFullscreenForCamera_ = false;
}

function openCamera(siteIdx) {
  activeSiteIdx = siteIdx;
  // 버튼 클릭(사용자 제스처) 시점에 미리 오디오를 켜둬야, 나중에 음성 명령으로
  // 찍었을 때도(버튼을 직접 누른 게 아니어도) 셔터 소리가 막히지 않는다.
  initAudioCtx();
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    cameraInput.click();
    return;
  }
  // 접지저항/절연저항 측정기 화면 숫자나 명판의 작은 글씨까지 읽을 수 있어야 하므로
  // 해상도를 너무 낮추면 안 된다(1920×1080까지 낮췄더니 그런 글씨가 잘 안 보인다는
  // 피드백을 받아 다시 올렸다). "ideal"만 주고 "max"는 두지 않아서, 기기가 더 높은
  // 해상도를 지원하면 그대로 쓰고, 지원하지 않으면 기기가 알아서 가능한 만큼만 쓴다.
  // 업로드 속도 문제는 해상도가 아니라 통신 왕복 횟수가 원인이었어서(이미 수정함),
  // 화질을 낮추지 않아도 속도에는 큰 영향이 없다.
  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: 'environment',
      width: { ideal: 4032 },
      height: { ideal: 3024 },
      aspectRatio: { ideal: 4 / 3 },
    },
    audio: false,
  })
    .then(function (stream) {
      currentStream = stream;
      cameraVideo.srcObject = stream;
      shotCountThisSession = 0;
      clearReviewTray(); // 새 촬영 세션이므로 이전에 남아있던 임시 목록은 비운다
      cameraShotCount.textContent = '0장 담김';
      cameraQueueStatus.textContent = '';
      cameraOverlay.classList.remove('hidden');
      lockPortraitForCamera_(); // 가로 회전 시에도 버튼 위치가 안 움직이게 고정 시도
      updateWakeLock();
      startVoiceRecognition_(); // 음성 촬영이 켜져 있으면 카메라와 함께 듣기 시작

      // 휴대폰 기본 카메라 앱 수준의 화질을 내기 위해, 미리보기 비디오 프레임을
      // canvas로 캡처하는 대신(압축/다운샘플된 미리보기용 스트림이라 화질이 떨어짐)
      // 카메라 하드웨어의 실제 정지사진 캡처 파이프라인을 쓰는 ImageCapture API를
      // 우선 사용한다. 지원하지 않는 브라우저는 기존 canvas 캡처로 자동 대체된다.
      currentTrack = stream.getVideoTracks()[0] || null;
      imageCapture = null;
      if (currentTrack && window.ImageCapture) {
        try { imageCapture = new ImageCapture(currentTrack); } catch (e) { imageCapture = null; }
      }
      applyContinuousFocusExposure_(currentTrack);
      setupTorchToggle_(currentTrack);
    })
    .catch(function () {
      cameraInput.click();
    });
}

// 연속 자동초점/자동노출 — 기기가 지원하면 켜서, 손으로 계속 초점을 맞춰야
// 하는 문제 없이 기본 카메라 앱처럼 자동으로 선명하게 유지되게 한다.
function applyContinuousFocusExposure_(track) {
  if (!track || !track.getCapabilities) return;
  try {
    const caps = track.getCapabilities();
    const advanced = [];
    if (caps.focusMode && caps.focusMode.indexOf('continuous') !== -1) {
      advanced.push({ focusMode: 'continuous' });
    }
    if (caps.exposureMode && caps.exposureMode.indexOf('continuous') !== -1) {
      advanced.push({ exposureMode: 'continuous' });
    }
    if (advanced.length) track.applyConstraints({ advanced: advanced }).catch(function () {});
  } catch (e) { /* 지원하지 않는 기기는 무시 */ }
}

// 손전등(torch) — 지하주차장 등 어두운 현장에서 명판/측정기 글씨가 잘 보이도록.
let torchOn = false;

function setupTorchToggle_(track) {
  torchOn = false;
  if (torchToggleBtn) {
    torchToggleBtn.classList.remove('torch-on');
    torchToggleBtn.textContent = '🔦 조명 켜기';
  }
  if (!track || !track.getCapabilities) {
    if (torchToggleBtn) torchToggleBtn.classList.add('hidden');
    return;
  }
  try {
    const caps = track.getCapabilities();
    if (caps.torch) {
      if (torchToggleBtn) torchToggleBtn.classList.remove('hidden');
    } else {
      if (torchToggleBtn) torchToggleBtn.classList.add('hidden');
    }
  } catch (e) {
    if (torchToggleBtn) torchToggleBtn.classList.add('hidden');
  }
}

function toggleTorch_() {
  if (!currentTrack) return;
  torchOn = !torchOn;
  currentTrack.applyConstraints({ advanced: [{ torch: torchOn }] }).catch(function () {
    torchOn = !torchOn; // 실패하면 상태 되돌리기
  }).then(function () {
    if (torchToggleBtn) {
      torchToggleBtn.classList.toggle('torch-on', torchOn);
      torchToggleBtn.textContent = torchOn ? '🔦 조명 끄기' : '🔦 조명 켜기';
    }
  });
}

if (torchToggleBtn) torchToggleBtn.addEventListener('click', toggleTorch_);

// 화면을 탭하면 그 지점에 초점을 맞춘다(기본 카메라 앱의 "탭하여 초점" 동작).
if (videoWrap && cameraVideo) {
  videoWrap.addEventListener('click', function (ev) {
    if (!currentTrack || !currentTrack.getCapabilities) return;
    let caps;
    try { caps = currentTrack.getCapabilities(); } catch (e) { return; }
    const rect = videoWrap.getBoundingClientRect();
    const x = (ev.clientX - rect.left) / rect.width;
    const y = (ev.clientY - rect.top) / rect.height;
    if (focusRing) {
      focusRing.style.left = ev.clientX - rect.left + 'px';
      focusRing.style.top = ev.clientY - rect.top + 'px';
      focusRing.classList.remove('hidden');
      focusRing.classList.remove('pulse');
      void focusRing.offsetWidth; // 재시작을 위한 리플로우 강제
      focusRing.classList.add('pulse');
    }
    if (caps.pointsOfInterest) {
      currentTrack.applyConstraints({
        advanced: [{ pointsOfInterest: [{ x: x, y: y }], focusMode: 'single-shot' }],
      }).then(function () {
        // 탭 초점 이후에도 계속 자동으로 초점이 맞도록 연속 모드로 복귀
        setTimeout(function () { applyContinuousFocusExposure_(currentTrack); }, 1200);
      }).catch(function () {});
    }
  });
}

// "✕ 닫기"를 누르면, 그때까지 미리보기에 남아있던(=삭제하지 않은) 사진들을
// 한꺼번에 업로드하고 카메라를 닫는다. 미리보기에서 X로 지운 사진은 애초에
// 업로드되지 않는다.
function closeCamera() {
  finalizeReviewTray();
  stopVoiceRecognition_();
  if (currentStream) {
    currentStream.getTracks().forEach(function (t) { t.stop(); });
    currentStream = null;
  }
  currentTrack = null;
  imageCapture = null;
  if (focusRing) focusRing.classList.add('hidden');
  cameraOverlay.classList.add('hidden');
  unlockPortraitForCamera_();
  if (activeSiteIdx) refreshPhotoList(activeSiteIdx);
  updateWakeLock();
}

cameraCloseBtn.addEventListener('click', closeCamera);

// ------------------------------------------------------------------
// 연사 촬영 + 미리보기에서 골라 업로드
//
// 셔터를 짧게 탭하면 한 장만 찍힌다. 셔터를 누른 채로 있으면(휴대폰 기본
// 카메라의 "누르고 있으면 연사" 동작과 동일하게) 일정 간격으로 계속 찍혀서
// 화면 아래 미리보기 줄에 쌓인다. 미리보기의 각 사진 오른쪽 위 ✕를 누르면
// 그 사진은 삭제되어 업로드되지 않는다. "✕ 닫기"를 누르는 순간, 그때 미리보기에
// 남아있는(=지우지 않은) 사진들만 구글 드라이브로 업로드되고 휴대폰에도 저장된다.
// ------------------------------------------------------------------
const reviewTrayEl = document.getElementById('reviewTray');
let reviewTray = []; // [{id, blob, thumbUrl, siteIdx}]

const HOLD_THRESHOLD_MS = 350; // 이보다 오래 누르고 있으면 "연사"로 판단
const BURST_INTERVAL_MS = 180; // 연사 중 촬영 간격

let holdTimer = null;
let burstInterval = null;
let isBursting = false;

// ------------------------------------------------------------------
// 셔터 소리 — 외부 음원 파일 없이 Web Audio API로 "찰칵" 소리를 직접 만든다.
// (모바일 브라우저 자동재생 정책 때문에, 실제 사용자 터치(pointerdown) 시점에
// AudioContext를 미리 만들어/깨워둔다 — initAudioCtx() 참고.)
// ------------------------------------------------------------------
let audioCtx = null;

function initAudioCtx() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) { /* 지원하지 않는 브라우저는 그냥 무음 */ }
}

// 예전 버전은 사각파(square wave) 두 개로 "삐빅" 소리를 냈는데 너무 전자음처럼
// 들린다는 피드백을 받았다. 이번에는 화이트노이즈를 대역통과 필터로 걸러서 만든
// 두 번의 "딸깍" 클릭음(거울/셔터가 열릴 때, 닫힐 때)으로 바꿔서 실제 카메라
// 셔터 소리에 더 가깝게 만들었다.
let shutterNoiseBuffer = null;

function getShutterNoiseBuffer_() {
  if (shutterNoiseBuffer) return shutterNoiseBuffer;
  const len = Math.floor(audioCtx.sampleRate * 0.15);
  shutterNoiseBuffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = shutterNoiseBuffer.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  return shutterNoiseBuffer;
}

function playNoiseClick_(startTime, duration, freq, q, gainPeak) {
  const src = audioCtx.createBufferSource();
  src.buffer = getShutterNoiseBuffer_();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = freq;
  filter.Q.value = q;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(gainPeak, startTime + 0.002);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  src.connect(filter).connect(gain).connect(audioCtx.destination);
  src.start(startTime);
  src.stop(startTime + duration + 0.02);
}

function playShutterSound() {
  if (!audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    playNoiseClick_(now, 0.035, 3200, 3.2, 0.9);        // 셔터 열림 — 짧고 날카로운 클릭
    playNoiseClick_(now + 0.05, 0.05, 1500, 2.2, 0.55); // 셔터 닫힘 — 살짝 낮고 부드러운 클릭
  } catch (e) { /* 소리 재생 실패는 무시 — 촬영 자체에는 영향 없음 */ }
}

// 미리보기 비디오 프레임을 canvas에 그려서 캡처하는 예전 방식(ImageCapture를
// 지원하지 않는 브라우저용 대체 수단). 미리보기 스트림은 화면 표시용으로
// 압축/다운샘플되어 있어서 실제 카메라 하드웨어의 정지사진보다 화질이 떨어진다.
function captureFrameFromVideo_() {
  return new Promise(function (resolve, reject) {
    const w = cameraVideo.videoWidth;
    const h = cameraVideo.videoHeight;
    if (!w || !h) { reject(new Error('no video frame')); return; }
    captureCanvas.width = w;
    captureCanvas.height = h;
    captureCanvas.getContext('2d').drawImage(cameraVideo, 0, 0, w, h);
    captureCanvas.toBlob(function (blob) {
      if (!blob) reject(new Error('toBlob failed'));
      else resolve(blob);
    }, 'image/jpeg', 0.92); // 측정기 숫자/명판 글씨 판독성을 위해 압축률을 낮게(화질은 높게) 잡는다
  });
}

function addBlobToReviewTray_(blob, siteIdx) {
  const id = 't' + Date.now() + '_' + Math.floor(Math.random() * 100000);
  const thumbUrl = URL.createObjectURL(blob);
  reviewTray.push({ id: id, blob: blob, thumbUrl: thumbUrl, siteIdx: siteIdx });
  renderReviewTray();
}

// 연사 중 ImageCapture.takePhoto()가 다음 촬영이 시작되기 전에 반드시 끝나도록
// 막아주는 플래그. takePhoto()는 canvas 캡처보다 느릴 수 있어서(하드웨어 파이프라인을
// 실제로 타기 때문), 고정 간격 타이머만 믿으면 이전 촬영이 안 끝났는데 다음 호출이
// 겹쳐 들어갈 수 있다.
let burstCaptureBusy = false;

function captureFrameToTray() {
  if (!currentStream || !activeSiteIdx) return;
  if (burstCaptureBusy) return; // 이전 촬영이 아직 진행 중이면 이번 타이머 틱은 건너뛴다
  burstCaptureBusy = true;
  const siteIdx = activeSiteIdx;

  // 휴대폰 기본 카메라 앱과 동급의 화질을 위해, 지원되는 기기에서는 미리보기
  // 프레임 캡처 대신 카메라의 실제 정지사진 캡처 파이프라인(ImageCapture)을 쓴다.
  const capturePromise = imageCapture
    ? imageCapture.takePhoto().catch(function () { return captureFrameFromVideo_(); })
    : captureFrameFromVideo_();

  playShutterSound();
  capturePromise
    .then(function (blob) { addBlobToReviewTray_(blob, siteIdx); })
    .catch(function () { /* 이번 한 장만 실패 — 연사/전체 촬영은 계속 진행 */ })
    .then(function () { burstCaptureBusy = false; });
}

// 미리보기 줄의 작은 썸네일은 잘 보이는지 확인하기 어려우므로, 썸네일을 터치하면
// 전체화면 뷰어(openViewer)가 열려서 핀치줌/스와이프로 크게 확인할 수 있게 한다.
function renderReviewTray() {
  reviewTrayEl.classList.toggle('hidden', reviewTray.length === 0);
  reviewTrayEl.innerHTML = '';
  reviewTray.forEach(function (item) {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = '<img src="' + item.thumbUrl + '">'
      + '<button type="button" class="del" data-id="' + item.id + '">✕</button>';
    reviewTrayEl.appendChild(div);
  });
  reviewTrayEl.querySelectorAll('.del').forEach(function (btn) {
    btn.addEventListener('click', function (ev) {
      ev.stopPropagation();
      removeFromReviewTray(btn.getAttribute('data-id'));
    });
  });
  reviewTrayEl.querySelectorAll('.thumb img').forEach(function (img, idx) {
    img.addEventListener('click', function () { openViewer(idx); });
  });
  cameraShotCount.textContent = reviewTray.length + '장 담김';
}

// ------------------------------------------------------------------
// 전체화면 사진 뷰어 — 기본 카메라 앱처럼 썸네일을 눌러 크게 보고,
// 손가락 두 개로 확대/축소(핀치줌), 확대 상태에서 드래그로 이동,
// 확대하지 않은 상태에서 좌우로 밀면(스와이프) 이전/다음 사진으로 이동한다.
// ------------------------------------------------------------------
const photoViewer = document.getElementById('photoViewer');
const viewerStage = document.getElementById('viewerStage');
const viewerImg = document.getElementById('viewerImg');
const viewerIndexLabel = document.getElementById('viewerIndexLabel');
const viewerCloseBtn = document.getElementById('viewerCloseBtn');
const viewerDeleteBtn = document.getElementById('viewerDeleteBtn');

let viewerIndex = 0;
let viewerScale = 1, viewerPanX = 0, viewerPanY = 0;

function openViewer(idx) {
  if (!reviewTray.length) return;
  viewerIndex = idx;
  showViewerPhoto();
  photoViewer.classList.remove('hidden');
}

function showViewerPhoto() {
  const item = reviewTray[viewerIndex];
  if (!item) { closeViewer(); return; }
  viewerImg.src = item.thumbUrl;
  resetViewerTransform();
  viewerIndexLabel.textContent = (viewerIndex + 1) + ' / ' + reviewTray.length;
}

function resetViewerTransform() {
  viewerScale = 1; viewerPanX = 0; viewerPanY = 0;
  applyViewerTransform();
}

function applyViewerTransform() {
  viewerImg.style.transform = 'translate(' + viewerPanX + 'px,' + viewerPanY + 'px) scale(' + viewerScale + ')';
}

function closeViewer() {
  photoViewer.classList.add('hidden');
}

viewerCloseBtn.addEventListener('click', closeViewer);
viewerDeleteBtn.addEventListener('click', function () {
  const item = reviewTray[viewerIndex];
  if (!item) return;
  removeFromReviewTray(item.id);
  if (reviewTray.length === 0) { closeViewer(); return; }
  if (viewerIndex >= reviewTray.length) viewerIndex = reviewTray.length - 1;
  showViewerPhoto();
});

let gestureStartDist = 0, gestureStartScale = 1, isPinching = false;
let viewerPanStart = null, viewerSwipeStartX = null;

function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

viewerStage.addEventListener('touchstart', function (e) {
  if (e.touches.length === 2) {
    isPinching = true;
    gestureStartDist = getTouchDist(e.touches);
    gestureStartScale = viewerScale;
  } else if (e.touches.length === 1) {
    isPinching = false;
    viewerPanStart = { x: e.touches[0].clientX - viewerPanX, y: e.touches[0].clientY - viewerPanY };
    viewerSwipeStartX = e.touches[0].clientX;
  }
}, { passive: true });

viewerStage.addEventListener('touchmove', function (e) {
  if (isPinching && e.touches.length === 2) {
    const dist = getTouchDist(e.touches);
    viewerScale = Math.min(4, Math.max(1, gestureStartScale * (dist / gestureStartDist)));
    applyViewerTransform();
  } else if (e.touches.length === 1 && viewerPanStart && viewerScale > 1) {
    viewerPanX = e.touches[0].clientX - viewerPanStart.x;
    viewerPanY = e.touches[0].clientY - viewerPanStart.y;
    applyViewerTransform();
  }
}, { passive: true });

viewerStage.addEventListener('touchend', function (e) {
  if (viewerScale <= 1.05 && viewerSwipeStartX !== null && e.changedTouches.length) {
    const dx = e.changedTouches[0].clientX - viewerSwipeStartX;
    if (Math.abs(dx) > 60) {
      if (dx < 0 && viewerIndex < reviewTray.length - 1) { viewerIndex++; showViewerPhoto(); }
      else if (dx > 0 && viewerIndex > 0) { viewerIndex--; showViewerPhoto(); }
    }
  }
  if (e.touches.length === 0) {
    isPinching = false;
    viewerPanStart = null;
    viewerSwipeStartX = null;
    if (viewerScale < 1) resetViewerTransform();
  }
});

function removeFromReviewTray(id) {
  const idx = reviewTray.findIndex(function (item) { return item.id === id; });
  if (idx === -1) return;
  URL.revokeObjectURL(reviewTray[idx].thumbUrl);
  reviewTray.splice(idx, 1);
  renderReviewTray();
}

function clearReviewTray() {
  closeViewer();
  reviewTray.forEach(function (item) { URL.revokeObjectURL(item.thumbUrl); });
  reviewTray = [];
  renderReviewTray();
}

// 미리보기에 남아있는(=지우지 않은) 사진들을 실제로 업로드 대기열에 넣고,
// 휴대폰에도 저장한 뒤 미리보기를 비운다.
function finalizeReviewTray() {
  closeViewer();
  reviewTray.forEach(function (item) {
    saveBlobToDevice(item.blob, makeLocalFileName(item.siteIdx));
    enqueueUpload(item.siteIdx, item.blob, 'image/jpeg');
  });
  reviewTray.forEach(function (item) { URL.revokeObjectURL(item.thumbUrl); });
  reviewTray = [];
  reviewTrayEl.classList.add('hidden');
  reviewTrayEl.innerHTML = '';
}

function stopShutterHold() {
  if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  if (burstInterval) { clearInterval(burstInterval); burstInterval = null; }
  shutterBtn.classList.remove('holding');
  if (!isBursting) {
    captureFrameToTray(); // 짧게 눌렀다 뗀 경우 = 한 장만 촬영
  }
  isBursting = false;
}

shutterBtn.addEventListener('pointerdown', function (ev) {
  ev.preventDefault();
  initAudioCtx(); // 사용자가 직접 누른 시점에 미리 켜둬야 이후 소리 재생이 막히지 않는다
  isBursting = false;
  holdTimer = setTimeout(function () {
    isBursting = true;
    shutterBtn.classList.add('holding');
    captureFrameToTray();
    burstInterval = setInterval(captureFrameToTray, BURST_INTERVAL_MS);
  }, HOLD_THRESHOLD_MS);
});
shutterBtn.addEventListener('pointerup', stopShutterHold);
shutterBtn.addEventListener('pointerleave', function () {
  if (isBursting) stopShutterHold(); // 연사 중 손가락이 버튼을 벗어나면 종료
});
shutterBtn.addEventListener('pointercancel', stopShutterHold);

// 촬영한 사진을 구글 드라이브 업로드와는 별개로 이 휴대폰에도 즉시 내려받아 남겨둔다.
function saveBlobToDevice(blob, fileName) {
  try {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 5000);
  } catch (e) { /* 로컬 저장 실패는 무시 — 업로드에는 영향 없음 */ }
}

function makeLocalFileName(siteIdx) {
  const ts = new Date();
  const pad = function (n) { return String(n).padStart(2, '0'); };
  return (selected ? selected.waitingNo : 'photo') + '_' + siteIdx + '거점_'
    + ts.getFullYear() + pad(ts.getMonth() + 1) + pad(ts.getDate()) + '_'
    + pad(ts.getHours()) + pad(ts.getMinutes()) + pad(ts.getSeconds())
    + '_' + Math.floor(Math.random() * 900 + 100) + '.jpg';
}

// 예전 방식(휴대폰 기본 카메라 앱) 대체 경로 — getUserMedia를 못 쓰는 경우에만 사용됨.
cameraInput.addEventListener('change', function (e) {
  const file = e.target.files[0];
  const siteIdx = activeSiteIdx;
  cameraInput.value = '';
  if (!file || !selected || !siteIdx) return;
  saveBlobToDevice(file, makeLocalFileName(siteIdx));
  enqueueUpload(siteIdx, file, file.type || 'image/jpeg');
  setSiteStatus(siteIdx, '기본카메라 사진 1장 업로드 대기열에 추가됨');
});

// ------------------------------------------------------------------
// 백그라운드 업로드 대기열
//
// 이전 버전의 문제점 두 가지를 고쳤다:
//  1) 재시도할 때마다 파일명을 새로 만들어서, "실제로는 올라갔는데 확인만 실패한"
//     경우에 같은 사진이 다른 이름으로 중복 업로드되고 있었다. → 파일명을 큐에
//     넣는 시점에 한 번만 정해서 재시도 내내 그대로 쓰고, 재시도 직전에 "혹시
//     이미 올라가 있는지"부터 먼저 확인해서 중복 업로드를 막는다.
//  2) 큐가 메모리(변수)에만 있어서 화면을 끄거나 앱(탭)을 닫으면 대기 중이던
//     업로드가 통째로 사라졌다. → IndexedDB에도 함께 저장해두고, 페이지를 다시
//     열면 자동으로 이어서 업로드한다.
// ------------------------------------------------------------------
let uploadQueue = [];

const UPLOAD_DB_NAME = 'ev_charger_upload_queue_v1';
const UPLOAD_STORE_NAME = 'queue';
let uploadDbPromise = null;

function openUploadDb_() {
  if (!window.indexedDB) return Promise.reject(new Error('IndexedDB 미지원'));
  if (uploadDbPromise) return uploadDbPromise;
  uploadDbPromise = new Promise(function (resolve, reject) {
    const req = indexedDB.open(UPLOAD_DB_NAME, 1);
    req.onupgradeneeded = function () {
      const db = req.result;
      if (!db.objectStoreNames.contains(UPLOAD_STORE_NAME)) {
        db.createObjectStore(UPLOAD_STORE_NAME, { keyPath: 'qid' });
      }
    };
    req.onsuccess = function () { resolve(req.result); };
    req.onerror = function () { reject(req.error); };
  });
  return uploadDbPromise;
}

function dbPutQueueItem_(item) {
  return openUploadDb_().then(function (db) {
    return new Promise(function (resolve, reject) {
      const tx = db.transaction(UPLOAD_STORE_NAME, 'readwrite');
      tx.objectStore(UPLOAD_STORE_NAME).put(item);
      tx.oncomplete = function () { resolve(); };
      tx.onerror = function () { reject(tx.error); };
    });
  });
}

function dbDeleteQueueItem_(qid) {
  return openUploadDb_().then(function (db) {
    return new Promise(function (resolve, reject) {
      const tx = db.transaction(UPLOAD_STORE_NAME, 'readwrite');
      tx.objectStore(UPLOAD_STORE_NAME).delete(qid);
      tx.oncomplete = function () { resolve(); };
      tx.onerror = function () { reject(tx.error); };
    });
  });
}

function dbGetAllQueueItems_() {
  return openUploadDb_().then(function (db) {
    return new Promise(function (resolve, reject) {
      const tx = db.transaction(UPLOAD_STORE_NAME, 'readonly');
      const req = tx.objectStore(UPLOAD_STORE_NAME).getAll();
      req.onsuccess = function () { resolve(req.result || []); };
      req.onerror = function () { reject(req.error); };
    });
  });
}

// 페이지를 열 때, 이전 세션에서 화면 꺼짐/탭 종료 등으로 못 끝낸 업로드가
// 남아있으면 자동으로 이어서 올린다.
openUploadDb_()
  .then(function () { return dbGetAllQueueItems_(); })
  .then(function (items) {
    if (!items || !items.length) return;
    items.forEach(function (it) {
      uploadQueue.push({
        qid: it.qid, waitingNo: it.waitingNo, applicantName: it.applicantName,
        siteIdx: it.siteIdx, fileName: it.fileName, mimeType: it.mimeType,
        file: it.blob, attempts: 0, inFlight: false,
      });
    });
    setSiteStatus(items[0].siteIdx, '이전에 못 끝낸 업로드 ' + items.length + '장을 이어서 올리는 중...');
    processUploadQueue();
  })
  .catch(function () { /* IndexedDB를 못 쓰는 환경이면 이어올리기만 못 할 뿐, 그 외 동작에는 영향 없음 */ });

let qidCounter_ = 0;
function makeQid_() { return 'q' + Date.now() + '_' + (qidCounter_++) + '_' + Math.floor(Math.random() * 100000); }

function queueCountFor(siteIdx) {
  return uploadQueue.filter(function (q) { return q.siteIdx === siteIdx; }).length;
}

function setSiteStatus(siteIdx, text, cls) {
  const el = document.getElementById('shootStatus-' + siteIdx);
  if (el) { el.textContent = text; el.className = 'status' + (cls ? ' ' + cls : ''); }
  if (cameraOverlay && !cameraOverlay.classList.contains('hidden') && activeSiteIdx === siteIdx) {
    cameraQueueStatus.textContent = text;
  }
}

function enqueueUpload(siteIdx, fileOrBlob, mimeType) {
  if (!selected) return;
  const qid = makeQid_();
  const fileName = makeLocalFileName(siteIdx);
  const item = {
    qid: qid,
    waitingNo: selected.waitingNo,
    applicantName: selected.applicantName,
    siteIdx: siteIdx,
    fileName: fileName,
    mimeType: mimeType,
    attempts: 0,
    file: fileOrBlob,
    inFlight: false,
  };
  uploadQueue.push(item);
  // 화면 꺼짐/탭 종료에 대비해 IndexedDB에도 같이 저장해둔다(실패해도 메모리 큐로는 계속 진행).
  dbPutQueueItem_({
    qid: qid, waitingNo: item.waitingNo, applicantName: item.applicantName,
    siteIdx: siteIdx, fileName: fileName, mimeType: mimeType, blob: fileOrBlob,
  }).catch(function () {});
  setSiteStatus(siteIdx, '업로드 대기/진행 중: ' + queueCountFor(siteIdx) + '장 (계속 촬영하셔도 됩니다)');
  updateWakeLock();
  processUploadQueue();
}

// 한 장씩 순서대로만 올리면 사진마다 왕복 통신(저장 요청 → 목록 조회로 확인)이 그대로
// 다 더해져서 느리다. 최대 MAX_CONCURRENT_UPLOADS장을 동시에 진행해서 전체 처리 속도를
// 끌어올린다(각 업로드는 자기만의 iframe/폼을 새로 만들어 쓰므로 서로 겹쳐도 안전하다).
const MAX_CONCURRENT_UPLOADS = 3;
let activeUploadCount = 0;

function processUploadQueue() {
  if (uploadQueue.length === 0) { updateWakeLock(); return; }
  while (activeUploadCount < MAX_CONCURRENT_UPLOADS) {
    const item = uploadQueue.find(function (q) { return !q.inFlight; });
    if (!item) break;
    item.inFlight = true;
    activeUploadCount++;
    doUploadOne_(item);
  }
}

// 서버(Code.gs의 uploadPhoto)가 같은 파일명이 이미 있으면 다시 만들지 않도록(멱등) 처리해
// 두었으므로, 여기서는 업로드 전에 미리 조회해서 확인하는 절차 없이 바로 보낸다 — 왕복 한 번이
// 줄어드는 만큼 빨라진다. 재시도로 같은 사진이 두 번 보내져도 서버 쪽에서 중복 생성을 막는다.
// R2 업로드 키: <대기번호>/<거점번호>/<파일명> -- Worker의 /list/<prefix> 조회와 짝이 맞아야 한다.
function photoKey_(waitingNo, siteIdx, fileName) {
  return waitingNo + '/' + siteIdx + '/' + fileName;
}

function doUploadOne_(item) {
  const key = photoKey_(item.waitingNo, item.siteIdx, item.fileName);
  const keyPath = key.split('/').map(encodeURIComponent).join('/');
  fetch(WORKER_URL + '/upload/' + keyPath, {
    method: 'PUT',
    headers: { 'Content-Type': item.mimeType || 'application/octet-stream' },
    body: item.file,
  })
    .then(function (resp) {
      if (!resp.ok) throw new Error('업로드 실패 (status ' + resp.status + ')');
      return listPhotosFromR2_(item.waitingNo, item.siteIdx);
    })
    .then(function (photos) { onUploadItemDone_(item, photos); })
    .catch(function (err) { onUploadItemFailed_(item, err); });
}

// Worker의 /list/<prefix> 엔드포인트로 특정 거점의 사진 목록을 조회한다.
function listPhotosFromR2_(waitingNo, siteIdx) {
  const prefix = waitingNo + '/' + siteIdx + '/';
  const prefixPath = prefix.split('/').map(encodeURIComponent).join('/');
  return fetch(WORKER_URL + '/list/' + prefixPath, { cache: 'no-store' })
    .then(function (resp) { return resp.json(); })
    .then(function (data) { return (data && data.items) || []; });
}

function onUploadItemDone_(item, photos) {
  const idx = uploadQueue.indexOf(item);
  if (idx !== -1) uploadQueue.splice(idx, 1);
  activeUploadCount--;
  dbDeleteQueueItem_(item.qid).catch(function () {});
  const grid = document.getElementById('photoGrid-' + item.siteIdx);
  if (grid && selected && selected.waitingNo === item.waitingNo && selected.applicantName === item.applicantName) {
    renderPhotoGrid(grid, photos);
  }
  const remaining = queueCountFor(item.siteIdx);
  setSiteStatus(item.siteIdx, '업로드 완료: ' + item.fileName
    + (remaining ? ' (남은 업로드 ' + remaining + '장)' : ''), 'ok');
  updateWakeLock();
  processUploadQueue();
}

function onUploadItemFailed_(item, err) {
  item.attempts++;
  item.inFlight = false;
  activeUploadCount--;
  const MAX_ATTEMPTS = 30; // 현장 네트워크가 불안정해도 쉽게 포기하지 않도록 넉넉하게 잡는다.
  if (item.attempts < MAX_ATTEMPTS) {
    const backoffMs = Math.min(20000, 1500 * item.attempts); // 실패할수록 점점 더 기다렸다 재시도(점진적 백오프)
    setSiteStatus(item.siteIdx, '업로드 재시도 대기 중(' + item.attempts + '회): ' + err.message, 'err');
    setTimeout(processUploadQueue, backoffMs);
  } else {
    // 완전히 포기하지 않고 계속 재시도되도록 한다(무한정 같은 자리에서 막혀있지 않게).
    setSiteStatus(item.siteIdx, '업로드가 계속 실패하고 있습니다: ' + err.message + ' — 네트워크가 좋아지면 자동으로 다시 시도합니다.', 'err');
    item.attempts = 0;
    setTimeout(processUploadQueue, 20000);
  }
}

function renderPhotoGrid(grid, photos) {
  grid.innerHTML = '';
  (photos || []).forEach(function (p) {
    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.textContent = p.name;
    grid.appendChild(a);
  });
}

function refreshPhotoList(siteIdx) {
  if (!selected) return;
  const grid = document.getElementById('photoGrid-' + siteIdx);
  if (!grid) return;
  listPhotosFromR2_(selected.waitingNo, siteIdx)
    .then(function (photos) { renderPhotoGrid(grid, photos); })
    .catch(function () { /* 조용히 무시 */ });
}
</script>
